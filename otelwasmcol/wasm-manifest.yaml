dist:
  module: github.com/evan-bradley/kceu-2026-wasm-talk/otelwasmcol
  name: otelwasmcol
  version: 0.0.1-dev
  output_path: ./bin/

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.146.1
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.146.1
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.146.1
  - gomod: github.com/evan-bradley/kceu-2026-wasm-talk/jsexporter v0.0.0
    path: ../jsexporter

processors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.146.0

receivers:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/githubreceiver v0.146.0

connectors:
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.146.1

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.146.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.52.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.52.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.52.0

conf_resolver:
  default_uri_scheme: http
